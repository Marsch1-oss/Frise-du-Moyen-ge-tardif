<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Frise Chronologique</title>
<style>
body { font-family: Arial; margin: 0; }

#timeline-container {
  width: 100%;
  height: 400px;
  overflow: hidden;
  border: 1px solid #ccc;
  position: relative;
  cursor: grab;
}

.rulers-section {
  position: relative;
  background: #eee;
}

.ruler-chip {
  position: absolute;
  height: 18px;
  background: #6c3eb0;
  color: white;
  font-size: 11px;
  padding: 2px 4px;
  border-radius: 4px;
}

.event {
  position: absolute;
  top: 120px;
  font-size: 12px;
}

.type-legend {
  padding: 5px;
}
</style>
</head>

<body>

<div class="type-legend">
<strong>★★★★</strong> Niveau 1
<strong>★★★</strong> Niveau 2
<strong>★★</strong> Niveau 3
<strong>★</strong> Niveau 4
</div>

<div id="timeline-container">
  <div id="rulers" class="rulers-section"></div>
  <div id="events"></div>
</div>

<script src="frise.js"></script>
</body>
</html>
