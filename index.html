<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frise chronologique — Moyen Âge tardif (1300–1500)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment:    #F5EDD8;
      --parchment-dk: #E8D9BA;
      --ink:          #1C140A;
      --ink-soft:     #4A3B28;
      --ink-muted:    #7A6A52;
      --red:          #8B1A1A;
      --gold:         #9A6B1A;
      --border:       rgba(100,80,40,0.25);
      --border-dark:  rgba(100,80,40,0.5);
      --track-h:      36px;
      --label-w:      130px;
      --radius:       6px;
      --shadow:       0 2px 12px rgba(50,30,10,0.12);
    }

    html { font-size: 15px; scroll-behavior: smooth; }

    body {
      background: var(--parchment-dk);
      color: var(--ink);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      line-height: 1.6;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(180,140,80,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(100,60,20,0.06) 0%, transparent 60%);
    }

    /* ── En-tête ────────────────────────────────────────────────────── */
    header {
      background: var(--ink);
      color: var(--parchment);
      padding: 2rem 2.5rem 1.6rem;
      border-bottom: 3px solid var(--gold);
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg, transparent 0px, transparent 60px,
        rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px
      );
      pointer-events: none;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .site-title {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 2rem;
      letter-spacing: 0.02em;
      color: var(--parchment);
      line-height: 1.15;
      margin-bottom: 0.3rem;
    }

    .site-sub {
      font-size: 0.95rem;
      color: rgba(245,237,216,0.6);
      font-style: italic;
      letter-spacing: 0.05em;
    }

    /* ── Contenu principal ──────────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    /* ── Barre de navigation ────────────────────────────────────────── */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      padding: 0.35rem 1rem;
      border: 1px solid var(--border-dark);
      border-radius: 20px;
      background: rgba(245,237,216,0.6);
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.02em;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--ink);
      color: var(--parchment);
      border-color: var(--ink);
    }

    .nav-btn.active {
      background: var(--ink);
      color: var(--parchment);
      border-color: var(--ink);
      font-weight: 600;
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* ── Fil d'Ariane ───────────────────────────────────────────────── */
    #breadcrumb {
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .bc-link {
      color: var(--red);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .bc-link:hover { color: var(--ink); }
    .bc-sep { color: var(--ink-muted); }
    .bc-item { font-style: italic; }

    /* ── Filtre zones ───────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.8rem;
      margin-bottom: 1.2rem;
      padding: 0.8rem 1.2rem;
      background: rgba(245,237,216,0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      align-items: center;
    }

    .filter-title {
      font-size: 0.8rem;
      color: var(--ink-muted);
      font-style: italic;
      margin-right: 0.4rem;
      white-space: nowrap;
    }

    .filter-actions {
      display: flex;
      gap: 0.4rem;
      margin-left: auto;
    }

    .filter-action-btn {
      font-family: 'Crimson Pro', serif;
      font-size: 0.78rem;
      padding: 0.15rem 0.7rem;
      border: 1px solid var(--border-dark);
      border-radius: 12px;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-action-btn:hover {
      background: var(--ink);
      color: var(--parchment);
      border-color: var(--ink);
    }

    .zone-checkbox {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      user-select: none;
      font-size: 0.85rem;
      color: var(--ink-soft);
      font-style: italic;
      padding: 0.2rem 0.6rem 0.2rem 0.4rem;
      border-radius: 14px;
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }

    .zone-checkbox:hover { border-color: var(--border-dark); }

    .zone-checkbox.checked {
      border-color: var(--border-dark);
      background: rgba(255,255,255,0.35);
    }

    .zone-checkbox.unchecked {
      opacity: 0.45;
    }

    .zone-checkbox input {
      display: none;
    }

    .zone-cb-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    /* ── Frise ──────────────────────────────────────────────────────── */
    .frise-card {
      background: rgba(245,237,216,0.85);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem 1rem;
      box-shadow: var(--shadow);
      overflow-x: auto;
    }

    #frise-container {
      min-width: 520px;
    }

    /* Axe */
    .axis-row {
      display: flex;
      align-items: flex-end;
      margin-bottom: 0.2rem;
      height: 32px;
    }

    .axis-spacer {
      width: var(--label-w);
      flex-shrink: 0;
    }

    .axis-bar {
      flex: 1;
      position: relative;
      height: 32px;
      border-bottom: 1.5px solid var(--border-dark);
    }

    .tick {
      position: absolute;
      bottom: 6px;
      font-size: 0.75rem;
      color: var(--ink-muted);
      transform: translateX(-50%);
      white-space: nowrap;
      font-style: italic;
      pointer-events: none;
    }

    .tick-line {
      position: absolute;
      bottom: 0;
      width: 1px;
      height: 8px;
      background: var(--border-dark);
      transform: translateX(-50%);
      pointer-events: none;
    }

    .axis-band {
      position: absolute;
      top: 0;
      bottom: 0;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 1px dashed var(--border);
    }

    .axis-band:hover {
      background: rgba(100,60,20,0.07);
    }

    /* Pistes */
    .track-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 0.4rem;
      min-height: var(--track-h);
    }

    .zone-label {
      width: var(--label-w);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--ink-soft);
      padding-right: 0.6rem;
      padding-top: 4px;
      white-space: nowrap;
      font-style: italic;
    }

    .zone-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .track {
      flex: 1;
      position: relative;
      min-height: var(--track-h);
      /* la hauteur est fixée dynamiquement par JS */
    }

    .track-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border);
      pointer-events: none;
      /* top est fixé dynamiquement par JS */
    }

    /* Chips événements */
    .evt-chip {
      position: absolute;
      cursor: pointer;
      transition: filter 0.15s, box-shadow 0.15s;
      z-index: 1;
    }

    .evt-chip:hover { z-index: 10; }

    .chip-dot {
      border-radius: 50%;
      border: 2px solid rgba(245,237,216,0.7);
    }

    .chip-dot:hover {
      filter: brightness(1.3);
      box-shadow: 0 2px 8px rgba(50,20,10,0.25);
    }

    .chip-medium {
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 12px;
      border: 1.5px solid;
      white-space: nowrap;
      line-height: 20px;
      font-style: italic;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      box-sizing: border-box;
    }

    .chip-medium:hover {
      filter: brightness(1.08);
      box-shadow: 0 2px 8px rgba(50,20,10,0.2);
    }

    .chip-full {
      font-size: 0.78rem;
      padding: 2px 10px;
      border-radius: 14px;
      white-space: nowrap;
      font-style: italic;
      line-height: 20px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
      box-sizing: border-box;
    }

    .chip-full:hover {
      filter: brightness(1.1);
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }

    /* Barre de période */
    .chip-period {
      border-radius: 4px;
      border: 1.5px solid;
      font-size: 0.72rem;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 6px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      min-width: 4px;
    }

    .chip-period:hover {
      filter: brightness(1.15);
      z-index: 10;
    }

    .chip-period-sm {
      padding: 0;
    }
      border-radius: 3px;
    }

    /* Hint */
    .frise-hint {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-style: italic;
      text-align: center;
    }

    /* ── Flèches navigation décennale ───────────────────────────────── */
    .decade-nav {
      display: none;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }

    .decade-nav.visible { display: flex; }

    .decade-arrow {
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      font-style: italic;
      padding: 0.35rem 1rem;
      border: 1px solid var(--border-dark);
      border-radius: 20px;
      background: rgba(245,237,216,0.6);
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .decade-arrow:hover:not(:disabled) {
      background: var(--ink);
      color: var(--parchment);
      border-color: var(--ink);
    }

    .decade-arrow:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .decade-label {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 1.05rem;
      color: var(--ink-soft);
      letter-spacing: 0.03em;
    }
    .error {
      padding: 1rem;
      color: var(--red);
      font-style: italic;
    }

    /* ── Modale fiche événement ─────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,10,5,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      backdrop-filter: blur(2px);
    }

    #modal-overlay.open { display: flex; }

    #modal-box {
      background: var(--parchment);
      border: 2px solid var(--border-dark);
      border-radius: 10px;
      padding: 2rem 2.4rem 1.8rem;
      max-width: 780px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 8px 40px rgba(30,15,5,0.3);
      animation: modal-in 0.22s ease;
    }

    @keyframes modal-in {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    #modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--ink-muted);
      line-height: 1;
      transition: color 0.15s;
      padding: 4px 6px;
      border-radius: 4px;
    }

    #modal-close:hover { color: var(--ink); background: var(--parchment-dk); }

    #modal-zone {
      display: inline-block;
      font-size: 0.78rem;
      padding: 2px 10px;
      border-radius: 12px;
      margin-bottom: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    #modal-date {
      font-size: 0.85rem;
      color: var(--ink-muted);
      font-style: italic;
      margin-bottom: 0.3rem;
    }

    #modal-title {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 1.7rem;
      color: var(--ink);
      margin-bottom: 1rem;
      line-height: 1.25;
    }

    #modal-desc {
      font-size: 1.05rem;
      color: var(--ink-soft);
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    #modal-sources {
      font-size: 0.88rem;
      color: var(--ink-muted);
      font-style: italic;
      border-top: 1px solid var(--border);
      padding-top: 0.7rem;
    }

    #modal-img {
      margin-top: 1.2rem;
      border-radius: 8px;
      overflow: hidden;
      max-height: 480px;
      overflow-y: auto;
    }

    #modal-img img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    /* ── Pied de page ───────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.82rem;
      color: var(--ink-muted);
      border-top: 1px solid var(--border);
      font-style: italic;
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 1.2rem 1rem; }
      .site-title { font-size: 1.4rem; }
      main { padding: 1rem 0.8rem 3rem; }
      :root { --label-w: 80px; }
    }
  </style>
</head>
<body>

  <!-- ── En-tête ──────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <h1 class="site-title">Frise du Moyen Âge tardif</h1>
      <p class="site-sub">1300 — 1500 · France · Angleterre · St Empire · Italie · Pén. ibérique · Europe C. & Or. · Monde islamique · Orient · Monde</p>
    </div>
  </header>

  <!-- ── Contenu ──────────────────────────────────────────────────────────── -->
  <main>

    <!-- Navigation niveaux -->
    <div class="nav-bar">
      <button class="nav-btn active" onclick="goLevel(1)">Vue d'ensemble</button>
      <button class="nav-btn" id="btn-level2" onclick="goLevel(2)" disabled>Vue siècle</button>
      <button class="nav-btn" id="btn-level3" onclick="goLevel(3)" disabled>Vue décennale</button>
    </div>

    <!-- Fil d'Ariane -->
    <div id="breadcrumb"></div>

    <!-- Filtre zones géographiques -->
    <div class="filter-bar" id="filter-bar">
      <span class="filter-title">Afficher :</span>
      <div id="zone-filters"></div>
      <div class="filter-actions">
        <button class="filter-action-btn" onclick="filterAll(true)">Tout</button>
        <button class="filter-action-btn" onclick="filterAll(false)">Aucun</button>
      </div>
    </div>

    <!-- Flèches navigation décennale (visibles uniquement au niveau 3) -->
    <div class="decade-nav" id="decade-nav">
      <button class="decade-arrow" id="arrow-prev" onclick="navigateDecade(-1)">
        ← Décennie précédente
      </button>
      <span class="decade-label" id="decade-label"></span>
      <button class="decade-arrow" id="arrow-next" onclick="navigateDecade(1)">
        Décennie suivante →
      </button>
    </div>

    <!-- Frise -->
    <div class="frise-card">
      <div id="frise-container">
        <p style="color:var(--ink-muted);font-style:italic;padding:1rem 0">Chargement…</p>
      </div>
    </div>

  </main>

  <!-- ── Pied de page ──────────────────────────────────────────────────────── -->
  <footer>
    Frise chronologique médiévale · données éditables dans <code>events.json</code>
  </footer>

  <!-- ── Modale fiche événement ────────────────────────────────────────────── -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal-box">
      <button id="modal-close" onclick="closeModal()" aria-label="Fermer">×</button>
      <div id="modal-zone"></div>
      <div id="modal-date"></div>
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>
      <p id="modal-sources"></p>
      <div id="modal-img"></div>
    </div>
  </div>

  <script src="frise.js"></script>

</body>
</html>
