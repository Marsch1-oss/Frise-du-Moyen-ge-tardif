<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Frise chronologique interactive du Moyen Âge tardif (1300–1500).">
  <title>Frise chronologique — Moyen Âge tardif</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    /* DESIGN PARCHEMIN & MÉDIÉVAL */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --parchment: #F5EDD8; --parchment-dk: #E8D9BA; --ink: #1C140A;
      --ink-soft: #4A3B28; --ink-muted: #7A6A52; --red: #8B1A1A; --gold: #9A6B1A;
      --border: rgba(100,80,40,0.25); --border-dark: rgba(100,80,40,0.5);
      --radius: 6px; --label-w: 100px;
    }
    body { background: var(--parchment-dk); color: var(--ink); font-family: 'Crimson Pro', serif; min-height: 100vh; }

    header { background: var(--ink); color: var(--parchment); padding: 1.5rem 2rem; border-bottom: 3px solid var(--gold); text-align: center; }
    .site-title { font-family: 'IM Fell English', serif; font-size: 2rem; margin-bottom: 0.5rem; }

    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

    /* NAVIGATION */
    .nav-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; justify-content: center; }
    .nav-btn { padding: 0.5rem 1.2rem; border: 1px solid var(--border-dark); border-radius: 20px; background: var(--parchment); cursor: pointer; font-family: inherit; transition: 0.2s; }
    .nav-btn:hover { background: var(--ink); color: white; }
    .nav-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
    .nav-btn-zones { background: #eef4ff; color: #2A4A6B; font-weight: bold; border-color: #2A4A6B; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

    /* RECHERCHE */
    .control-bar { margin-bottom: 1.5rem; display: flex; justify-content: center; }
    .search-bar { position: relative; width: 100%; max-width: 500px; }
    #search-input { width: 100%; padding: 0.7rem 1.2rem; border-radius: 25px; border: 1px solid var(--border-dark); background: var(--parchment); font-size: 1rem; }
    #search-results-list { position: absolute; top: 110%; left: 0; right: 0; background: white; border: 1px solid var(--border-dark); z-index: 1000; max-height: 300px; overflow-y: auto; display: none; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .search-item { padding: 10px 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
    .search-item:hover { background: #f0f7ff; }

    /* CONTENEUR FRISE */
    .frise-card { background: var(--parchment); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border-dark); overflow-x: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.15); position: relative; }
    #frise-container { position: relative; min-width: 900px; min-height: 400px; }

    /* MODALE DES ZONES */
    #zones-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
    #zones-modal-overlay.open { display: flex; }
    .zones-modal { background: var(--parchment); padding: 2rem; border-radius: 12px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; border: 3px solid var(--gold); }
    .zones-modal-header { font-family: 'IM Fell English', serif; font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-dark); padding-bottom: 0.5rem; }
    .zone-modal-chip { display: inline-block; padding: 6px 14px; margin: 5px; border-radius: 20px; border: 1px solid var(--border-dark); cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .zone-modal-chip.active { background: var(--gold); color: white; border-color: var(--gold); }

    /* MODALE DÉTAILS */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
    #modal-overlay.open { display: flex; }
    #modal-box { background: var(--parchment); padding: 2.5rem; border-radius: 10px; max-width: 800px; width: 100%; position: relative; border-left: 8px solid var(--gold); }
    #modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--ink-soft); }

    /* ADMIN LOGIN */
    #login-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 4000; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<header>
  <h1 class="site-title">Frise du Moyen Âge tardif</h1>
  <p style="font-style: italic; opacity: 0.8;">1300 — 1500 · Chroniques Européennes & Mondiales</p>
</header>

<main>
  <div class="nav-bar">
    <button class="nav-btn" onclick="goHome()">🏠 Accueil</button>
    <button class="nav-btn" onclick="goLevel(1)">Vue d'ensemble</button>
    <button class="nav-btn" id="btn-level2" onclick="goLevel(2)">Vue Siècle</button>
    <button class="nav-btn nav-btn-zones" onclick="openZonesModal()">🌍 Zones & Thèmes</button>
    <button class="nav-btn" onclick="openAdminLogin()" style="margin-left: auto; font-size: 0.8rem;">⚙️ Admin</button>
  </div>

  <div class="control-bar">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Rechercher un événement (ex: Peste noire, Azincourt...)" onkeyup="applySearch()">
      <div id="search-results-list"></div>
    </div>
  </div>

  <div id="breadcrumb" style="margin-bottom: 10px; font-weight: bold; color: var(--gold);"></div>

  <div class="frise-card">
    <div id="frise-container">
      <p style="text-align:center; padding: 50px; color: var(--ink-muted);">Chargement de la chronique...</p>
    </div>
  </div>
</main>

<div id="zones-modal-overlay">
  <div class="zones-modal">
    <div class="zones-modal-header">Sélectionner les régions et thèmes</div>
    <div id="zones-modal-content">
      </div>
    <div style="margin-top: 2rem; display: flex; gap: 10px;">
      <button class="nav-btn" onclick="selectAllZones()">Tout cocher</button>
      <button class="nav-btn" onclick="deselectAllZones()">Tout décocher</button>
      <button class="nav-btn active" onclick="closeZonesModal()" style="margin-left: auto;">Appliquer</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">×</button>
    <div id="modal-date" style="font-weight: bold; color: var(--red); margin-bottom: 5px;"></div>
    <h2 id="modal-title" style="font-family: 'IM Fell English', serif; font-size: 2rem; margin-bottom: 1rem;"></h2>
    <div id="modal-body" style="display: flex; gap: 20px; flex-wrap: wrap;">
      <div id="modal-img-wrap" style="flex: 1; min-width: 250px;"></div>
      <div id="modal-desc" style="flex: 2; font-size: 1.1rem; line-height: 1.7; text-align: justify;"></div>
    </div>
  </div>
</div>

<div id="login-overlay">
  <div style="background: var(--parchment); padding: 2rem; border-radius: 8px; text-align: center; border: 2px solid var(--gold);">
    <h3 style="margin-bottom: 1rem;">Accès Archiviste</h3>
    <input type="password" id="login-code" placeholder="Code" style="padding: 0.5rem; margin-bottom: 1rem; width: 100%;">
    <br>
    <button class="nav-btn active" onclick="checkAdminCode()">Valider</button>
    <button class="nav-btn" onclick="document.getElementById('login-overlay').style.display='none'">Annuler</button>
  </div>
</div>

<script src="frise.js"></script>

<script>
  function openAdminLogin() { document.getElementById('login-overlay').style.display = 'flex'; }
  function checkAdminCode() {
    if (document.getElementById('login-code').value === '1402') window.location.href = 'admin.html';
    else alert('Code incorrect');
  }
</script>

</body>
</html>
