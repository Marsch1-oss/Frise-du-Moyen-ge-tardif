font-size: 0.9rem;
    }

    .help-sep { 
      color: var(--border-dark); 
      margin: 0 0.4rem; 
    }

  </style>
</head>
<body>

<header>
  <h1 class="site-title">Frise du Moyen Âge tardif</h1>
  <p class="site-sub">1300 — 1500 · France · Angleterre · etc. · <span style="cursor:pointer; text-decoration:underline;" onclick="openAdminLogin()">Admin</span></p>
</header>

<main>
  <div class="nav-bar">
    <button class="nav-btn nav-btn-home" onclick="goHome()">🏠 Accueil</button>
    <span class="nav-sep"></span>
    <button class="nav-btn" onclick="goLevel(1)">Vue d’ensemble</button>
    <button class="nav-btn" id="btn-level2" onclick="goLevel(2)">Vue siècle</button>
    <button class="nav-btn" id="btn-level3" onclick="goLevel(3)" disabled>Vue décennale</button>
    <span class="nav-sep"></span>
    <button class="nav-btn nav-btn-zones" onclick="openZonesModal()">🌍 Zones & thèmes</button>
  </div>

  <div id="breadcrumb"></div>

  <div class="control-bar">
    <div class="search-bar" style="position: relative;">
      <label for="search-input">🔍</label>
      <input type="text" id="search-input" placeholder="Rechercher..." autocomplete="off" onkeyup="applySearch()">
      <div id="search-results-list" style="display:none;"></div>
    </div>
  </div>

  <div id="frise-container"></div>
</main>

<div id="zones-modal-overlay">
  <div class="zones-modal">
    <div class="zones-modal-header">
      <span>Sélectionner les zones et thèmes</span>
      <button class="zones-modal-close" onclick="closeZonesModal()">×</button>
    </div>
    <div class="zones-modal-body" id="zones-modal-content"></div>
    <div class="zones-modal-footer">
      <button class="zones-modal-btn" onclick="selectAllZones()">Tout cocher</button>
      <button class="zones-modal-btn" onclick="deselectAllZones()">Tout décocher</button>
      <button class="zones-modal-btn zones-modal-ok" onclick="closeZonesModal()">Terminer</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()">Fermer [Esc]</button>
    <div id="modal-zone"></div>
    <div id="modal-date"></div>
    <h2 id="modal-title"></h2>
    <div id="modal-body">
      <div id="modal-img-wrap"></div>
      <div id="modal-desc"></div>
    </div>
  </div>
</div>

<div id="login-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:var(--parchment); padding:2rem; border-radius:8px; width:320px; text-align:center; border: 2px solid var(--gold);">
    <h3 style="font-family:'IM Fell English', serif; margin-bottom:1rem;">Accès Archiviste</h3>
    <input type="password" id="login-code" placeholder="Code secret" style="width:100%; padding:0.6rem; border:1px solid var(--border-dark); border-radius:4px; margin-bottom:1rem;">
    <button onclick="checkAdminCode()" class="nav-btn active">Valider</button>
    <button onclick="closeAdminLogin()" class="nav-btn">Fermer</button>
    <div id="login-error" style="color:var(--red); margin-top:10px; font-size:0.8rem;"></div>
  </div>
</div>

<script src="frise.js"></script>

<script>
function openAdminLogin() { document.getElementById('login-overlay').style.display = 'flex'; }
function closeAdminLogin() { document.getElementById('login-overlay').style.display = 'none'; }
function checkAdminCode() {
  if (document.getElementById('login-code').value === '1402') { window.location.href = 'admin.html'; }
  else { document.getElementById('login-error').textContent = 'Code erroné'; }
}
</script>

</body>
</html>
