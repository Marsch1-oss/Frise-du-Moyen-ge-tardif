<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <title>Éditeur — Frise médiévale</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --parchment: #F5EDD8; --parchment-dk: #E8D9BA; --parchment-lt: #FAF5EA;
      --ink: #1C140A; --ink-soft: #4A3B28; --ink-muted: #7A6A52;
      --red: #8B1A1A; --gold: #9A6B1A; --green: #1A6B3C;
      --border: rgba(100,80,40,0.25); --border-dark: rgba(100,80,40,0.5);
      --radius: 8px; --shadow: 0 2px 16px rgba(50,30,10,0.13);
    }
    html { font-size: 15px; }
    body { background: var(--parchment-dk); color: var(--ink); font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; }
    header { background: var(--ink); color: var(--parchment); padding: 1.2rem 2rem; border-bottom: 3px solid var(--gold); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .header-title { font-family: 'IM Fell English', serif; font-size: 1.5rem; }

    .btn-back { font-family: 'Crimson Pro', serif; font-size: 0.85rem; padding: 0.3rem 1rem; border: 1px solid rgba(245,237,216,0.4); border-radius: 16px; color: var(--parchment); background: transparent; cursor: pointer; text-decoration: none; transition: all 0.15s; }
    .btn-back:hover { background: rgba(245,237,216,0.15); }
    .layout { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; padding: 1.5rem 2rem 3rem; max-width: 1300px; margin: 0 auto; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: var(--parchment-lt); border: 1px solid var(--border-dark); border-radius: var(--radius); padding: 1.6rem; box-shadow: var(--shadow); }
    .panel-title { font-family: 'IM Fell English', serif; font-size: 1.2rem; color: var(--ink); margin-bottom: 1.2rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .field-row.single { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    label { font-size: 0.8rem; color: var(--ink-muted); font-style: italic; letter-spacing: 0.03em; }
    label span.req { color: var(--red); margin-left: 2px; }

      padding-left: 0.1rem;
    }
    .zones-group-wrap { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.1rem; }
    .zone-tag { display: inline-flex; align-items: center; gap: 0.3rem; cursor: pointer; font-size: 0.82rem; font-style: italic; padding: 0.2rem 0.65rem; border-radius: 14px; border: 1.5px solid var(--border-dark); background: var(--parchment); color: var(--ink-soft); transition: all 0.15s; user-select: none; }

    .type-radio input { display: none; }
    .type-radio.selected { background: var(--ink); color: var(--parchment); border-color: var(--ink); }
    .type-radio .stars { color: var(--gold); letter-spacing: -1px; }

    .btn-row { display: flex; gap: 0.8rem; margin-top: 1.4rem; flex-wrap: wrap; }

    .btn-primary { background: var(--ink); color: var(--parchment); border-color: var(--ink); }
    .btn-primary:hover { background: #3A2A18; }
    .btn-secondary { background: transparent; color: var(--ink-soft); border-color: var(--border-dark); }
    .btn-secondary:hover { background: var(--parchment-dk); }
    .btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-success { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-success:hover { background: #0F3D24; }
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--parchment); padding: 0.7rem 1.6rem; border-radius: 20px; font-size: 0.88rem; font-style: italic; opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; border-left: 3px solid var(--gold); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .list-search { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .list-search input { flex: 1; }
    .event-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: calc(100vh - 280px); overflow-y: auto; padding-right: 4px; }
    .event-list::-webkit-scrollbar { width: 5px; }
    .event-list::-webkit-scrollbar-track { background: var(--parchment-dk); border-radius: 3px; }
    .event-list::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 3px; }
    .event-card { background: var(--parchment); border: 1px solid var(--border); border-radius: 6px; padding: 0.7rem 0.9rem; cursor: pointer; transition: all 0.15s; position: relative; }
    .event-card:hover { border-color: var(--gold); box-shadow: 0 2px 8px rgba(50,30,10,0.1); }
    .event-card.active { border-color: var(--gold); border-width: 2px; background: #FDF8EE; }
    .ec-header { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.2rem; }
    .ec-date { font-size: 0.78rem; color: var(--gold); font-weight: 600; white-space: nowrap; }
    .ec-title { font-size: 0.88rem; color: var(--ink); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .ec-id { font-size: 0.68rem; color: var(--ink-muted); font-style: italic; margin-left: auto; flex-shrink: 0; }
    .ec-meta { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
    .ec-zone { font-size: 0.7rem; padding: 1px 6px; border-radius: 8px; color: #fff; }
    .ec-type { font-size: 0.7rem; color: var(--gold); }
    .ec-del { position: absolute; top: 0.5rem; right: 0.5rem; background: none; border: none; color: var(--ink-muted); cursor: pointer; font-size: 1rem; opacity: 0; transition: opacity 0.15s; padding: 2px 5px; border-radius: 4px; }
    .event-card:hover .ec-del { opacity: 1; }
    .ec-del:hover { color: var(--red); background: #FEE; }
    .json-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .json-header span { font-size: 0.8rem; color: var(--ink-muted); font-style: italic; }
